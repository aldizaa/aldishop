<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ALDI PEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a2f44, #052e3d);
            min-height: 100vh;
        }
        .card-dashboard {
            background: linear-gradient(145deg, #0a4c66, #063e54);
            border-radius: 32px;
            border: 1px solid #0891b2;
            transition: 0.2s;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #06b6d4;
        }
        .btn-logout {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220,38,38,0.3);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="bg-[#062c3b] border-b-2 border-[#06b6d4] py-5 sticky top-0 z-50">
        <div class="container mx-auto px-5 flex flex-wrap justify-between items-center">
            <div class="text-2xl font-extrabold bg-gradient-to-r from-[#06b6d4] to-[#22d3ee] bg-clip-text text-transparent">
                <i class="fas fa-store mr-2"></i>ALDI PEDIA
            </div>
            <ul class="flex gap-6 font-semibold text-gray-200">
                <li><a href="index.html" class="hover:text-[#06b6d4]">Home</a></li>
                <li><a href="products.html" class="hover:text-[#06b6d4]">Products</a></li>
                <li><a href="contact.html" class="hover:text-[#06b6d4]">Contact</a></li>
                <li><a href="#" id="logoutBtn" class="text-red-400 hover:text-red-300">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mx-auto px-5 py-10">
        <!-- Welcome Banner -->
        <div class="card-dashboard p-8 mb-8 text-center">
            <h1 class="text-3xl font-bold text-[#22d3ee]">👋 Selamat Datang, <span id="usernameDisplay">User</span>!</h1>
            <p class="text-[#bae6fd] mt-2">Kelola pesanan dan akun Anda di sini</p>
        </div>

        <!-- Statistik -->
        <div class="grid md:grid-cols-3 gap-6 mb-10">
            <div class="card-dashboard p-6 text-center">
                <i class="fas fa-shopping-cart text-4xl text-[#06b6d4] mb-2"></i>
                <div class="stat-number" id="totalOrders">0</div>
                <p class="text-[#bae6fd]">Total Pesanan</p>
            </div>
            <div class="card-dashboard p-6 text-center">
                <i class="fas fa-money-bill-wave text-4xl text-[#06b6d4] mb-2"></i>
                <div class="stat-number" id="totalSpent">Rp 0</div>
                <p class="text-[#bae6fd]">Total Belanja</p>
            </div>
            <div class="card-dashboard p-6 text-center">
                <i class="fas fa-star text-4xl text-[#06b6d4] mb-2"></i>
                <div class="stat-number">4.9</div>
                <p class="text-[#bae6fd]">Rating Anda</p>
            </div>
        </div>

        <!-- Riwayat Pesanan -->
        <div class="card-dashboard p-6">
            <h2 class="text-2xl font-bold text-[#22d3ee] mb-4 flex items-center gap-2">
                <i class="fas fa-history"></i> Riwayat Pesanan
            </h2>
            <div id="ordersList" class="text-center py-6 text-[#bae6fd]">
                <i class="fas fa-inbox text-3xl mb-2 block"></i>
                Belum ada pesanan
            </div>
        </div>

        <!-- Tombol Aksi -->
        <div class="text-center mt-8">
            <a href="products.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-full font-bold bg-gradient-to-r from-[#06b6d4] to-[#0891b2] hover:shadow-lg transition">
                <i class="fas fa-shopping-bag"></i> Belanja Sekarang
            </a>
        </div>
    </div>

    <script>
        // Helper untuk mendapatkan user dari localStorage
        function getUser() {
            try {
                const raw = localStorage.getItem('loggedInUser');
                if (!raw) return null;
                return JSON.parse(raw);
            } catch(e) {
                console.error(e);
                return null;
            }
        }
        
        // Cek autentikasi
        const user = getUser();
        if (!user) {
            alert('Anda belum login. Silakan login terlebih dahulu.');
            window.location.href = 'login.html';
        }
        
        // Tampilkan username
        const usernameSpan = document.getElementById('usernameDisplay');
        if (usernameSpan) {
            usernameSpan.innerText = user.username || user.email.split('@')[0];
        }
        
        // Ambil data pesanan dari localStorage
        let orders = [];
        try {
            const ordersRaw = localStorage.getItem('userOrders');
            if (ordersRaw) {
                orders = JSON.parse(ordersRaw);
            }
        } catch(e) {
            console.error(e);
            orders = [];
        }
        
        // Update statistik
        const totalOrdersSpan = document.getElementById('totalOrders');
        const totalSpentSpan = document.getElementById('totalSpent');
        if (totalOrdersSpan) totalOrdersSpan.innerText = orders.length;
        const totalSpent = orders.reduce((sum, o) => sum + (o.amount || 0), 0);
        if (totalSpentSpan) totalSpentSpan.innerText = 'Rp ' + totalSpent.toLocaleString();
        
        // Tampilkan daftar pesanan
        const ordersListDiv = document.getElementById('ordersList');
        if (ordersListDiv) {
            if (orders.length === 0) {
                ordersListDiv.innerHTML = '<i class="fas fa-inbox text-3xl mb-2 block"></i> Belum ada pesanan';
            } else {
                ordersListDiv.innerHTML = orders.map(o => `
                    <div class="border-b border-[#0891b2] py-3 flex flex-wrap justify-between items-center gap-2">
                        <span class="font-semibold"><i class="fas fa-cube mr-1"></i> ${escapeHtml(o.productName || 'Produk')}</span>
                        <span class="text-[#06b6d4] font-bold">Rp ${(o.amount || 0).toLocaleString()}</span>
                        <span class="text-sm ${o.status === 'Selesai' ? 'text-green-400' : 'text-yellow-400'}">${o.status || 'Selesai'}</span>
                        <span class="text-xs text-[#bae6fd]">${o.date ? new Date(o.date).toLocaleDateString('id-ID') : ''}</span>
                    </div>
                `).join('');
            }
        }
        
        // Escape HTML untuk keamanan
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Logout
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('loggedInUser');
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
