<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ALDI PEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a2f44, #052e3d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: linear-gradient(145deg, #0a4c66, #063e54);
            max-width: 450px;
            width: 100%;
            border-radius: 48px;
            border: 1px solid #0891b2;
            box-shadow: 0 25px 45px rgba(6,182,212,0.2);
            padding: 40px 32px;
        }
        .input-field {
            background: #052e3d;
            border: 1px solid #0891b2;
            border-radius: 60px;
            padding: 14px 18px;
            width: 100%;
            color: white;
            transition: 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6,182,212,0.3);
        }
        .btn-login {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            transition: 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(6,182,212,0.3);
        }
        .google-btn {
            border: 1px solid #06b6d4;
            transition: 0.2s;
        }
        .google-btn:hover {
            background: rgba(6,182,212,0.1);
        }
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 1000;
            font-size: 0.9rem;
            border-left: 4px solid #06b6d4;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-6">
            <div class="text-3xl font-extrabold bg-gradient-to-r from-[#06b6d4] to-[#22d3ee] bg-clip-text text-transparent">
                <i class="fas fa-store mr-2"></i>ALDI PEDIA
            </div>
            <h2 class="text-2xl font-bold text-[#22d3ee] mt-2">Login Aman</h2>
            <p class="text-[#bae6fd] text-sm">Masuk untuk membeli produk digital</p>
        </div>

        <div id="statusMsg" class="mb-3 text-center text-sm"></div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" class="input-field mb-4" autocomplete="email" required>
            <input type="password" id="password" placeholder="Password" class="input-field mb-6" autocomplete="current-password" required>
            <button type="submit" class="btn-login w-full py-3 rounded-full font-bold text-white flex items-center justify-center gap-2">
                <i class="fas fa-key"></i> Masuk
            </button>
        </form>

        <div id="googleBtn" class="google-btn flex items-center justify-center gap-2 py-2 rounded-full mt-4 cursor-pointer text-[#bae6fd]">
            <i class="fab fa-google text-[#06b6d4]"></i> Login dengan Google
        </div>

        <div class="text-center text-sm text-[#bae6fd] my-4">atau</div>
        <p class="text-center">Belum punya akun? <a href="register.html" class="text-[#06b6d4] font-semibold hover:underline">Daftar Sekarang</a></p>
        <p class="text-center text-xs text-[#bae6fd]/70 mt-4">Data dilindungi enkripsi end-to-end</p>
    </div>

    <div id="toast" class="toast-message"></div>

    <script>
        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const googleBtn = document.getElementById('googleBtn');
        const toastDiv = document.getElementById('toast');
        
        function showToast(message, type = 'info') {
            toastDiv.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i> ${message}`;
            toastDiv.style.display = 'block';
            setTimeout(() => { toastDiv.style.display = 'none'; }, 4000);
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMsg');
            const color = type === 'error' ? 'bg-red-600' : (type === 'success' ? 'bg-green-600' : 'bg-blue-600');
            statusDiv.innerHTML = `<div class="inline-block px-3 py-1 rounded-full ${color} text-white text-sm">${message}</div>`;
            setTimeout(() => { statusDiv.innerHTML = ''; }, 3000);
        }
        
        // Login via API
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showStatus('Email dan password wajib diisi', 'error');
                return;
            }
            
            showStatus('⏳ Memproses...', 'info');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    // Simpan user ke localStorage
                    localStorage.setItem('loggedInUser', JSON.stringify(data.user));
                    showToast('✅ Login berhasil!', 'success');
                    showStatus('Login berhasil! Mengalihkan...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showStatus('❌ ' + (data.error || 'Login gagal'), 'error');
                }
            } catch (err) {
                console.error(err);
                showStatus('❌ Terjadi kesalahan jaringan', 'error');
            }
        });
        
        // Google login demo
        googleBtn.addEventListener('click', () => {
            // Simulasi login dengan Google
            const demoUser = {
                id: 999,
                email: 'demo@google.com',
                username: 'GoogleUser',
                role: 'user'
            };
            localStorage.setItem('loggedInUser', JSON.stringify(demoUser));
            showToast('✅ Login dengan Google (demo) berhasil', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
